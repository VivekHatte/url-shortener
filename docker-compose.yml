# One command to run the whole stack locally:  docker compose up --build
#
# This brings up three containers:
#   db:       PostgreSQL, with the schema auto-loaded on first start
#   backend:  the C++ / Drogon API
#   frontend: React app by nginx
#
# Opens in http://localhost:8088

services:
  db:
    image: postgres:16-alpine
    environment: #TODO: Update config values using secrets or env variables
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener 
    # Postgres runs any *.sql in this folder the first time the data volume is created, so our schema is applied automatically.
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment: #TODO: Update Config values using secrets
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: urlshortener
      DB_USER: postgres
      DB_PASSWORD: postgres
    # Wait until Postgres reports healthy before starting.
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8088:80" 

volumes:
  pgdata:
