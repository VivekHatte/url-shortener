# Nginx config for the container setup.

upstream backend {
    # "backend" is the service name from docker-compose
    server backend:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass http://backend;
        proxy_set_header Host $host;               # so the API builds short_url with the public host
        proxy_set_header X-Forwarded-Proto $scheme; # so it picks http vs https correctly
        proxy_set_header X-Real-IP $remote_addr;
    }
}
